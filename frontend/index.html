<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elarion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0f0d0a;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    #top-bar {
      height: 15vh;
      min-height: 80px;
      max-height: 120px;
      background: #1a1814;
      border-bottom: 1px solid #5c4d3d;
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
    }
    #game {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
      background: #0f0d0a;
    }
    #game canvas { display: block; }
    #inventory-panel {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 286px;
      background: rgba(10, 9, 7, 0.93);
      border-right: 1px solid #5a4a2a;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }
    #bottom-bar {
      height: 20vh;
      min-height: 100px;
      max-height: 200px;
      background: #1a1814;
      border-top: 1px solid #5c4d3d;
      flex-shrink: 0;
      display: flex;
    }

    /* Building Panel */
    .building-panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .building-panel {
      background: #1a1814;
      border: 2px solid #c9a55c;
      border-radius: 8px;
      padding: 24px 32px;
      min-width: 390px;
      max-width: 520px;
      position: relative;
      color: #e8dcc8;
    }
    .building-panel__close {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      color: #c9a55c;
      font-size: 24px;
      cursor: pointer;
    }
    .building-panel__close:hover {
      color: #e8dcc8;
    }
    .building-panel__title {
      font-family: 'Cinzel', serif;
      color: #c9a55c;
      margin: 0 0 12px 0;
      font-size: 20px;
    }
    .building-panel__body {
      color: #a89880;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="top-bar"></div>
  <div id="game">
    <div id="inventory-panel"></div>
  </div>
  <div id="bottom-bar"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
